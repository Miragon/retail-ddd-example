{{- if .Values.ingress.enabled -}}
{{- $useStripPrefix := .Values.ingress.stripPrefix.enabled -}}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "warehouse-backend.fullname" . }}
  labels:
    {{- include "warehouse-backend.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  entryPoints:
    - web
  routes:
    {{- range .Values.ingress.hosts }}
      {{- $host := .host }}
      {{- range .paths }}
    - kind: Rule
      match: Host(`{{ $host }}`) && PathPrefix(`{{ .path }}`)
      services:
        - name: {{ include "warehouse-backend.fullname" $ }}
          port: {{ $.Values.service.port }}
      {{- if $useStripPrefix }}
      middlewares:
        - name: {{ include "warehouse-backend.fullname" $ }}-strip-prefix
      {{- end }}
      {{- end }}
    {{- end }}
{{- end }}
