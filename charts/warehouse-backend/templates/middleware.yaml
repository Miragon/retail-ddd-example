{{- if and .Values.ingress.enabled .Values.ingress.stripPrefix.enabled }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "warehouse-backend.fullname" . }}-strip-prefix
  labels:
    {{- include "warehouse-backend.labels" . | nindent 4 }}
spec:
  stripPrefix:
    prefixes:
      {{- toYaml .Values.ingress.stripPrefix.prefixes | nindent 6 }}
{{- end }}
