replicaCount: 1

image:
  repository: warehouse-backend
  pullPolicy: IfNotPresent
  tag: "local"

service:
  port: 8080

ingress:
  enabled: false
  annotations: {}
  stripPrefix:
    enabled: false
    prefixes: []
  hosts:
    - host: warehouse-backend.local
      paths:
        - path: /
          pathType: Prefix

resources: {}

livenessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 45
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 20
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

env:
  - name: SWAGGER_API_ENABLED
    value: "false"
