replicaCount: 1

image:
  repository: shop-backend
  pullPolicy: IfNotPresent
  tag: "local"

service:
  port: 8080

ingress:
  enabled: false
  annotations: {}
  stripPrefix:
    enabled: false
    prefixes: []
  hosts:
    - host: shop-backend.local
      paths:
        - path: /
          pathType: Prefix

resources: {}

livenessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

env:
  - name: SWAGGER_API_ENABLED
    value: "false"
  - name: ISSUER_URI
    value: ""
  - name: CORS_ALLOWED_ORIGINS
    value: ""
  - name: DATABASE_URL
    value: ""
  - name: DATABASE_USER
    value: ""
  - name: DATABASE_PASSWORD
    value: ""
