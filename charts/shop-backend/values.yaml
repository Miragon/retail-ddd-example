replicaCount: 1

image:
  repository: shop-backend
  pullPolicy: IfNotPresent
  tag: "local"

service:
  port: 8080

ingress:
  enabled: false
  annotations: {}
  stripPrefix:
    enabled: false
    prefixes: []
  hosts:
    - host: shop-backend.local
      paths:
        - path: /
          pathType: Prefix

resources: {}

livenessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

env:
  - name: SPRING_PROFILES_ACTIVE
    value: "prod"
  - name: SPRING_DATASOURCE_URL
    value: "jdbc:postgresql://postgres-rw:5432/test"
  - name: SPRING_DATASOURCE_USERNAME
    valueFrom:
      secretKeyRef:
        name: postgres-auth
        key: username
  - name: SPRING_DATASOURCE_PASSWORD
    valueFrom:
      secretKeyRef:
        name: postgres-auth
        key: password
