replicaCount: 1

image:
  repository: shop-backend
  pullPolicy: IfNotPresent
  tag: "local"

service:
  port: 8080

ingress:
  enabled: false
  annotations: {}
  stripPrefix:
    enabled: false
    prefixes: []
  hosts:
    - host: shop-backend.local
      paths:
        - path: /
          pathType: Prefix

resources: {}

livenessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

application:
  database:
    type: postgres
    url: ""
    user: ""
    password: ""
  open-api-specs:
    enabled: false
  security:
    issuer-uri: ""
