apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "shop-backend.fullname" . }}-db-postgres
  labels:
    {{- include "shop-backend.labels" . | nindent 4 }}
{{- $db := (.Values.application.database | default dict) }}
data:
  DATABASE_DRIVER_CLASS_NAME: "org.postgresql.Driver"
  DATABASE_DIALECT: "org.hibernate.dialect.PostgreSQLDialect"
  DATABASE_URL: {{ required "shop-backend: application.database.url must be set" (index $db "url") | quote }}
  DATABASE_USER: {{ required "shop-backend: application.database.user must be set" (index $db "user") | quote }}
  DATABASE_PASSWORD: {{ required "shop-backend: application.database.password must be set" (index $db "password") | quote }}
