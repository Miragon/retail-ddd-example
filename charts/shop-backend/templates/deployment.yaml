apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "shop-backend.fullname" . }}
  labels:
    {{- include "shop-backend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "shop-backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "shop-backend.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- $db := (.Values.application.database | default dict) }}
          {{- $dbType := (index $db "type" | default "postgres") }}
          {{- if and (ne $dbType "postgres") (ne $dbType "h2") }}
          {{- fail (printf "shop-backend: unsupported application.database.type '%s' (allowed: postgres|h2)" $dbType) }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "shop-backend.fullname" . }}-db-{{ $dbType }}
          env:
            - name: SWAGGER_API_ENABLED
              value: {{ index .Values.application "open-api-specs" "enabled" | quote }}
            - name: DATABASE_SAMPLE_DATA_ENABLED
              value: {{ index .Values.application "sample-data" "enabled" | quote }}
            - name: ISSUER_URI
              value: {{ index .Values.application.security "issuer-uri" | quote }}
