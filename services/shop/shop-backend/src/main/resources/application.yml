server:
  port: ${PORT:8080}

spring:
  security:
    oauth2:
      resource-server:
        jwt:
          issuer-uri: ${ISSUER_URI}
    allowed-cors-origins: ${CORS_ALLOWED_ORIGINS:}
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    driver-class-name: ${DATABASE_DRIVER_CLASS_NAME}
  flyway:
    locations:
      - classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: ${DATABASE_DIALECT}

sample-data:
  enabled: ${DATABASE_SAMPLE_DATA_ENABLED:false}
  locations:
    - classpath:db/sampledata

springdoc:
  api-docs:
    enabled: ${SWAGGER_API_ENABLED:false}
  swagger-ui:
    enabled: ${SWAGGER_API_ENABLED:false}
