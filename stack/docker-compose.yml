name: retail-ddd

services:
  postgres:
    image: postgres:18
    container_name: retail-postgres
    environment:
      POSTGRES_DB: test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      PGUSER: test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $$POSTGRES_DB -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.3
    container_name: retail-keycloak
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HOSTNAME: http://localhost:8080/auth
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME_STRICT: "false"
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./keycloak/healthcheck.sh:/healthcheck.sh:ro
    healthcheck:
      test: ["CMD", "bash", "/healthcheck.sh"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  keycloak-config-cli:
    image: adorsys/keycloak-config-cli:latest-26
    container_name: retail-keycloak-config-cli
    environment:
      KEYCLOAK_URL: http://keycloak:8080/auth
      KEYCLOAK_USER: admin
      KEYCLOAK_PASSWORD: admin
      KEYCLOAK_AVAILABILITYCHECK_ENABLED: "true"
      KEYCLOAK_AVAILABILITYCHECK_TIMEOUT: 120s
      IMPORT_FILES_LOCATION: /config/
      IMPORT_VARSUBSTITUTION_ENABLED: "true"
      KC_REDIRECT_URIS: '["http://localhost:8080/*","http://localhost:5173/*"]'
      KC_WEB_ORIGINS: '["http://localhost:8080","http://localhost:5173"]'
      KC_TEST_USER_PASSWORD: test
    volumes:
      - ./keycloak/retail-realm.yaml:/config/retail-realm.yaml:ro
    depends_on:
      keycloak:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: ..
      dockerfile: services/shop/shop-backend/Dockerfile
    image: shop-backend:local
    container_name: retail-backend
    profiles: ["with-shop"]
    ports:
      - "8081:8080"
    environment:
      SERVER_PORT: 8080
      ISSUER_URI: http://localhost:8080/auth/realms/retail
      DATABASE_URL: jdbc:postgresql://postgres:5432/test
      DATABASE_USER: test
      DATABASE_PASSWORD: test
      DATABASE_DRIVER_CLASS_NAME: org.postgresql.Driver
      DATABASE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      DATABASE_SAMPLE_DATA_ENABLED: "true"
      CORS_ALLOWED_ORIGINS: "http://localhost:8080,http://localhost:5173"
      SWAGGER_API_ENABLED: "true"
    extra_hosts:
      - "localhost:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: services/shop/shop-frontend/Dockerfile
    image: shop-frontend:local
    container_name: retail-frontend
    profiles: ["with-shop"]
    ports:
      - "5173:8080"
    volumes:
      - ./shop/frontend.env:/usr/share/nginx/html/app.env:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: retail-nginx
    ports:
      - "8080:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      keycloak:
        condition: service_healthy
    restart: unless-stopped
