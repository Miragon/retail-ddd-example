name: retail-${BRANCH_SLUG}

services:
  postgres:
    image: postgres:18
    container_name: retail-${BRANCH_SLUG}-postgres
    environment:
      POSTGRES_DB: test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      PGUSER: test
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $$POSTGRES_DB -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.3
    container_name: retail-${BRANCH_SLUG}-keycloak
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: http://auth.${BRANCH_SLUG}.localhost:1355
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME_STRICT: "false"
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./keycloak/healthcheck.sh:/healthcheck.sh:ro
    ports:
      - "${KEYCLOAK_PORT}:8080"
    healthcheck:
      test: ["CMD", "bash", "/healthcheck.sh"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  keycloak-config-cli:
    image: adorsys/keycloak-config-cli:latest-26
    container_name: retail-${BRANCH_SLUG}-keycloak-config-cli
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_USER: admin
      KEYCLOAK_PASSWORD: admin
      KEYCLOAK_AVAILABILITYCHECK_ENABLED: "true"
      KEYCLOAK_AVAILABILITYCHECK_TIMEOUT: 120s
      IMPORT_FILES_LOCATION: /config/
      IMPORT_VARSUBSTITUTION_ENABLED: "true"
      KC_REDIRECT_URIS: '["http://app.${BRANCH_SLUG}.localhost:1355/*"]'
      KC_WEB_ORIGINS: '["http://app.${BRANCH_SLUG}.localhost:1355"]'
      KC_TEST_USER_PASSWORD: test
    volumes:
      - ./keycloak/retail-realm.yaml:/config/retail-realm.yaml:ro
    depends_on:
      keycloak:
        condition: service_healthy
    restart: "no"
